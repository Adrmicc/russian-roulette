# Russian Roulette — CI/CD Pipeline
# Jobs:
#   build — Build Docker image
#   test  — Run container & verify endpoints respond correctly

name: CI/CD Pipeline

on:
  push:
    branches: [main]  
  pull_request:
    branches: [main]

jobs:
  # Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t russian-roulette:latest .

      - name: Save Docker image as artifact
        run: |
          docker save russian-roulette:latest -o /tmp/russian-roulette.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/russian-roulette.tar
          retention-days: 1

  # Test
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load -i /tmp/russian-roulette.tar

      - name: Start container
        run: |
          docker run -d --name roulette-test \
            -p 5000:5000 \
            -e SECRET_KEY=ci-test-secret \
            russian-roulette:latest

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              echo "App is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 2
          done
          echo "App failed to start"
          docker logs roulette-test
          exit 1

      - name: Test health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:5000/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || \
          echo "$RESPONSE" | grep -q '"status": "ok"'

      - name: Test game API — spin
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:5000/api/spin)
          echo "Spin response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"round"'

      - name: Test game API — reset
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:5000/api/reset)
          echo "Reset response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"alive"'

      - name: Test main page loads
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/)
          echo "Main page HTTP code: $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ]

      - name: Stop container
        if: always()
        run: |
          docker stop roulette-test || true
          docker rm roulette-test || true
